<!doctype html>
<html lang="en" data-theme="light" data-accent="indigo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f4f6fa; --bg2:#eef0f5; --card:#fff; --text:#2d3142; --text2:#6b7280; --border:#e8ebf0;
      --ac:#6366f1; --ac2:#818cf8; --ac-sh:rgba(99,102,241,.25); --green:#16a34a; --red:#dc2626;
      --font:'Outfit',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    [data-theme="dark"] { --bg:#111318; --bg2:#1a1d24; --card:#1e2028; --text:#e5e7eb; --text2:#9ca3af; --border:#2d3040; --green:#4ade80; --red:#f87171; }
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:linear-gradient(145deg,var(--bg),var(--bg2));color:var(--text);font-family:var(--font);transition:.3s}

    .pg{display:none;min-height:100vh;max-width:820px;margin:0 auto;padding:24px 16px 120px}
    .pg.on{display:block;animation:pageIn .35s ease}
    @keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:20px;box-shadow:0 14px 34px rgba(15,23,42,.12)}
    .muted{color:var(--text2)} .mb12{margin-bottom:12px} .mb16{margin-bottom:16px}
    .row{display:flex;gap:10px;align-items:center}
    .inp{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);outline:none}
    .inp:focus{border-color:var(--ac);box-shadow:0 0 0 4px rgba(99,102,241,.15)}
    .btn{border:0;border-radius:999px;padding:12px 16px;font-weight:700;cursor:pointer}
    .btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 10px 24px var(--ac-sh)}
    .btn-o{background:transparent;color:var(--ac);border:1px solid var(--border)}
    .list .item{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:12px;margin-top:8px;background:rgba(255,255,255,.45)}
    .pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}

    .loading-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 10%,rgba(99,102,241,.15),transparent 35%),linear-gradient(145deg,var(--bg),var(--bg2));transition:opacity .7s ease,transform .7s ease;animation:loadingAutoHide .01s linear 5s forwards}
    .loading-screen.fade-out{opacity:0;transform:scale(.985);pointer-events:none}
    .loading-wrap{text-align:center;animation:rise .7s ease both}
    @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .coin{width:110px;height:110px;border-radius:999px;display:grid;place-items:center;font-weight:900;font-size:32px;color:var(--ac);margin:0 auto 20px;background:var(--card);box-shadow:inset 0 0 0 8px rgba(99,102,241,.12),0 14px 34px rgba(15,23,42,.14);animation:floatY 2.8s ease-in-out infinite}
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .dots{margin-top:14px}.dot{width:8px;height:8px;border-radius:50%;background:var(--ac);display:inline-block;margin:0 4px;animation:blink 1.3s ease-in-out infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    @keyframes loadingAutoHide{to{opacity:0;visibility:hidden;pointer-events:none}}

    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0 14px}
    .pill{border:1px solid var(--border);border-radius:14px;padding:10px;background:var(--card)}
    .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:min(92vw,560px);height:70px;border-radius:35px;display:flex;align-items:center;justify-content:space-around;background:rgba(255,255,255,.6);backdrop-filter:blur(16px);border:1px solid var(--border)}
    .nav button{background:none;border:0;font-weight:700;color:var(--text2);cursor:pointer}
    @media (min-width:900px){.pg{padding:36px 24px 120px}}
    @media (scripting: none){#loadingScreen{display:none !important}}
  </style>
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-wrap">
      <div class="coin">BF</div>
      <h1>Budget Flow</h1>
      <p class="muted">Track your money beautifully</p>
      <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <button class="btn btn-o" style="margin-top:14px" onclick="document.getElementById('loadingScreen').style.display='none';document.getElementById('pgW').classList.add('on');">Skip loading</button>
    </div>
  </div>

  <main id="pgW" class="pg on">
    <div class="card" style="text-align:center;max-width:560px;margin:10vh auto 0">
      <h1 class="mb12">Welcome to Budget Flow</h1>
      <p class="muted mb16">Start by creating your account.</p>
      <input id="inpN" class="inp mb16" placeholder="Your name" />
      <button class="btn btn-p" onclick="startOB()">Track Your Finance →</button>
    </div>
  </main>

  <main id="pgT" class="pg">
    <div class="topbar">
      <div>
        <div class="muted">Hello,</div>
        <h2 id="uN" style="margin:0">My Budget</h2>
      </div>
      <button class="btn btn-o" onclick="togTheme()">Toggle Theme</button>
    </div>

    <section class="summary">
      <div class="pill"><div class="muted">Income</div><div id="sumI" class="pos">RM 0.00</div></div>
      <div class="pill"><div class="muted">Expenses</div><div id="sumE" class="neg">RM 0.00</div></div>
      <div class="pill"><div class="muted">Balance</div><div id="sumB">RM 0.00</div></div>
    </section>

    <section class="card mb16">
      <h3 class="mb12">Add Income</h3>
      <div class="row mb12"><input id="fIN" class="inp" placeholder="Income name"><input id="fIA" class="inp" placeholder="Amount" type="number" min="0" step="0.01"></div>
      <button class="btn btn-p" onclick="addI()">Add Income</button>
      <div id="iL" class="list"></div>
    </section>

    <section class="card">
      <h3 class="mb12">Add Expense</h3>
      <div class="row mb12"><input id="fEN" class="inp" placeholder="Expense name"><input id="fEA" class="inp" placeholder="Amount" type="number" min="0" step="0.01"></div>
      <button class="btn btn-p" onclick="addE()">Add Expense</button>
      <div id="eL" class="list"></div>
    </section>
  </main>

  <nav class="nav">
    <button onclick="go('pgW')">Welcome</button>
    <button onclick="go('pgT')">Tracker</button>
  </nav>

  <script>
  (function () {
    var K = 'bf4';
    function $(id) { return document.getElementById(id); }

    function safeRead() {
      try {
        var parsed = JSON.parse(localStorage.getItem(K) || '{"accounts":[],"prefs":{}}');
        if (!parsed || typeof parsed !== 'object') return { accounts: [], prefs: {} };
        if (!Array.isArray(parsed.accounts)) parsed.accounts = [];
        if (!parsed.prefs || typeof parsed.prefs !== 'object') parsed.prefs = {};
        return parsed;
      } catch (e) {
        return { accounts: [], prefs: {} };
      }
    }

    function safeWrite(data) {
      try { localStorage.setItem(K, JSON.stringify(data)); } catch (e) {}
    }

    var db = safeRead();
    var currentId = db.accounts.length ? db.accounts[0].id : null;

    function fmt(n) { return 'RM ' + (Number(n) || 0).toFixed(2); }
    function monthKey(d) {
      var m = d.getMonth() + 1;
      return d.getFullYear() + '-' + String(m).padStart(2, '0');
    }

    function currentAccount() {
      for (var i = 0; i < db.accounts.length; i++) {
        if (db.accounts[i].id === currentId) return db.accounts[i];
      }
      return null;
    }

    function ensureAccount() {
      if (db.accounts.length) return;
      var input = $('inpN');
      var name = input && input.value ? input.value.trim() : '';
      if (!name) name = 'My Budget';
      var acc = { id: 'a_' + Date.now(), name: name, incomes: [], expenses: [] };
      db.accounts.push(acc);
      currentId = acc.id;
      safeWrite(db);
    }

    function totals() {
      var acc = currentAccount();
      if (!acc) return { inc: 0, exp: 0, net: 0 };
      var mk = monthKey(new Date());
      var inc = 0, exp = 0, i;
      for (i = 0; i < acc.incomes.length; i++) {
        if (String(acc.incomes[i].date || '').indexOf(mk) === 0) inc += Number(acc.incomes[i].amount) || 0;
      }
      for (i = 0; i < acc.expenses.length; i++) {
        if (String(acc.expenses[i].date || '').indexOf(mk) === 0) exp += Number(acc.expenses[i].amount) || 0;
      }
      return { inc: inc, exp: exp, net: inc - exp };
    }

    function go(id) {
      var pages = document.querySelectorAll('.pg');
      for (var i = 0; i < pages.length; i++) pages[i].classList.remove('on');
      var el = $(id);
      if (el) el.classList.add('on');
    }

    function render() {
      var acc = currentAccount();
      if (!acc) return;
      var t = totals();
      if ($('uN')) $('uN').textContent = acc.name;
      if ($('sumI')) $('sumI').textContent = fmt(t.inc);
      if ($('sumE')) $('sumE').textContent = fmt(t.exp);
      if ($('sumB')) $('sumB').textContent = fmt(t.net);

      if ($('iL')) {
        if (acc.incomes.length) {
          var ih = '';
          for (var i = 0; i < acc.incomes.length; i++) {
            var it = acc.incomes[i];
            ih += '<div class="item"><span>' + it.name + '</span><span class="pos">+' + fmt(it.amount) + '</span></div>';
          }
          $('iL').innerHTML = ih;
        } else {
          $('iL').innerHTML = '<p class="muted">No income yet.</p>';
        }
      }

      if ($('eL')) {
        if (acc.expenses.length) {
          var eh = '';
          for (var j = 0; j < acc.expenses.length; j++) {
            var ex = acc.expenses[j];
            eh += '<div class="item"><span>' + ex.name + '</span><span class="neg">-' + fmt(ex.amount) + '</span></div>';
          }
          $('eL').innerHTML = eh;
        } else {
          $('eL').innerHTML = '<p class="muted">No expenses yet.</p>';
        }
      }
    }

    function addIncome() {
      ensureAccount();
      var acc = currentAccount();
      if (!acc) return;
      var nameEl = $('fIN');
      var amtEl = $('fIA');
      var name = nameEl ? nameEl.value.trim() : '';
      var amount = amtEl ? parseFloat(amtEl.value || '0') : 0;
      if (!name || !(amount > 0)) return;
      acc.incomes.push({ id: 'i_' + Date.now(), name: name, amount: amount, date: new Date().toISOString().slice(0, 10) });
      if (nameEl) nameEl.value = '';
      if (amtEl) amtEl.value = '';
      safeWrite(db);
      render();
    }

    function addExpense() {
      ensureAccount();
      var acc = currentAccount();
      if (!acc) return;
      var nameEl = $('fEN');
      var amtEl = $('fEA');
      var name = nameEl ? nameEl.value.trim() : '';
      var amount = amtEl ? parseFloat(amtEl.value || '0') : 0;
      if (!name || !(amount > 0)) return;
      acc.expenses.push({ id: 'e_' + Date.now(), name: name, amount: amount, date: new Date().toISOString().slice(0, 10) });
      if (nameEl) nameEl.value = '';
      if (amtEl) amtEl.value = '';
      safeWrite(db);
      render();
    }

    function startOB() {
      ensureAccount();
      go('pgT');
      render();
    }

    function togTheme() {
      var root = document.documentElement;
      root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function hideLoadingAndBoot() {
      var ls = $('loadingScreen');
      var boot = function () {
        db = safeRead();
        currentId = db.accounts.length ? db.accounts[0].id : null;
        if (currentId) {
          go('pgT');
          render();
        } else {
          go('pgW');
        }
      };
      if (!ls) { boot(); return; }
      ls.classList.add('fade-out');
      setTimeout(function () {
        ls.style.display = 'none';
        boot();
      }, 700);
    }


    window.__forceBoot = function () {
      var ls = $('loadingScreen');
      if (ls) ls.style.display = 'none';
      if (!$('pgW').classList.contains('on') && !$('pgT').classList.contains('on')) go('pgW');
    };

    window.go = go;
    window.startOB = startOB;
    window.finOB = startOB;
    window.addI = addIncome;
    window.addE = addExpense;
    window.togTheme = togTheme;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        setTimeout(hideLoadingAndBoot, 1800);
      });
    } else {
      setTimeout(hideLoadingAndBoot, 1800);
    }

    // Hard fallback: ensure loading never blocks UI.
    setTimeout(function () {
      var ls = $('loadingScreen');
      if (ls && ls.style.display !== 'none') {
        ls.style.display = 'none';
        if (!$('pgW').classList.contains('on') && !$('pgT').classList.contains('on')) {
          go('pgW');
        }
      }
    }, 5500);
  })();
  </script>
</body>
</html>
